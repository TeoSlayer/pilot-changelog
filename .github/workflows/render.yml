name: render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Opt actions into Node 24 — silences the Node 20 deprecation warnings.
  # Default flips on 2026-06-02; remove this env block then.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-and-render:
    runs-on: ubuntu-latest
    outputs:
      docs-built: ${{ steps.docs.outputs.docs-built }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Self-test (parser + validate + render)
        run: python3 scripts/test.py

      - name: Validate frontmatter
        run: python3 scripts/validate.py

      - name: Render feeds + RSS + Pages site
        id: docs
        run: |
          python3 scripts/render.py
          echo "docs-built=true" >> "$GITHUB_OUTPUT"

      - name: Fail if deterministic outputs are out of date
        # Wall-clock-windowed feeds (1d/7d/1m) shift over time and
        # are not enforced. Everything else here is deterministic
        # given entries — committed copies must match render output.
        run: |
          if ! git diff --exit-code -- \
                feed.json feed-flagged.json feed.md feed.xml index.json \
                feed-protocol.json feed-networks.json feed-skills.json \
                feed-infra.json feed-ops.json feed-docs.json \
                docs/index.html docs/sitemap.xml docs/robots.txt \
                docs/entries; then
            echo "::error::Deterministic outputs are out of date. Run scripts/render.sh and commit." >&2
            exit 1
          fi

      - name: Assemble Pages bundle
        # Pages serves from a single origin; bundle the HTML site + every
        # public feed file together so peer consumers can fetch
        # https://teoslayer.github.io/pilot-changelog/feed.json (etc.)
        # without leaving the origin. Same files remain at repo root for
        # raw.githubusercontent.com consumers.
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p _site
          # docs/ contains: index.html, style.css, entries/*.html,
          # robots.txt, sitemap.xml — all generated/static SEO surface.
          cp -r docs/* _site/
          cp feed.json feed.md feed.xml index.json _site/
          cp feed-flagged.json feed-1d.json feed-7d.json feed-1m.json _site/
          cp feed-protocol.json feed-networks.json feed-skills.json _site/
          cp feed-infra.json feed-ops.json feed-docs.json _site/
          ls -la _site/
          ls -la _site/entries/ | head -10

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Upload feeds as artifact
        uses: actions/upload-artifact@v4
        with:
          name: feeds
          path: |
            feed.json
            feed-1d.json
            feed-7d.json
            feed-1m.json
            feed-flagged.json
            feed.md
            feed.xml
            index.json
            feed-protocol.json
            feed-networks.json
            feed-skills.json
            feed-infra.json
            feed-ops.json
            feed-docs.json

  deploy-pages:
    if: github.ref == 'refs/heads/main'
    needs: validate-and-render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
